##############################################################################
# EXAMPLE — build-image.yml for the app repo dispatch approach
#
# This file is an EXAMPLE only. It lives in .github/workflows-examples/ and
# is NOT executed by BUX-task. The current working setup builds images from
# the what-time-is-it/ directory committed directly in BUX-task.
#
# ─── When to use this instead ───────────────────────────────────────────────
#
# Use this as the active build-image.yml when you have permission to add the
# dispatch workflow to the app repo (see what-time-is-it-dispatch-bux-task.yml).
#
# Differences from the current build-image.yml:
#   • Uses --no-source: Cloud Build clones the app repo itself instead of
#     receiving the BUX-task source upload.
#   • Passes _APP_REPO and _APP_REF substitutions to cloudbuild.yaml so Cloud
#     Build knows which repo and branch to clone.
#   • IMAGE_TAG uses the SHA sent by the app repo in the dispatch payload,
#     giving the image a tag that matches the exact app commit that triggered it.
#
# The cloudbuild.yaml used alongside this file must include a clone step, e.g.:
#   - name: "gcr.io/cloud-builders/git"
#     id: clone
#     args: [clone, --depth=1, --branch=${_APP_REF}, ${_APP_REPO}, app]
#
# Required secrets (same as the current setup — no new secrets in BUX-task):
#   WORKLOAD_IDENTITY_PROVIDER  – from scripts/bootstrap-wif.sh
#   GCP_SERVICE_ACCOUNT         – github-actions-sa@<project>.iam.gserviceaccount.com
##############################################################################
name: Build Image

concurrency:
  group: terraform-production
  cancel-in-progress: false

on:
  repository_dispatch:
    types: [what-time-is-it-updated]   # triggered by what-time-is-it-dispatch-bux-task.yml
  workflow_dispatch:
    inputs:
      app_ref:
        description: "Branch or tag of buxapp/what-time-is-it to build (default: master)"
        required: false
        default: master
        type: string
      trigger_release:
        description: "Trigger blue/green deploy after a successful build"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

env:
  # For repository_dispatch use the ref/sha sent by the app repo; for workflow_dispatch use inputs.
  APP_REF:   ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.ref || inputs.app_ref || 'master' }}
  IMAGE_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.sha || github.sha }}

jobs:
  build:
    name: Build image via Cloud Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT:        ${{ secrets.GCP_SERVICE_ACCOUNT }}

    outputs:
      image_ref: ${{ steps.image-ref.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Read project/region/app_name from committed prod.tfvars so no GitHub Variables needed.
      - name: Read config from prod.tfvars
        id: cfg
        run: |
          tfvars=terraform/env/prod.tfvars
          project=$(  grep 'project_id'      "$tfvars" | sed 's/.*= *"\(.*\)"/\1/')
          region=$(   grep 'primary_region'  "$tfvars" | sed 's/.*= *"\(.*\)"/\1/')
          app_name=$( grep 'app_name'        "$tfvars" | sed 's/.*= *"\(.*\)"/\1/')
          registry="${region}-docker.pkg.dev/${project}/${app_name}"
          echo "project=${project}"     >> "$GITHUB_OUTPUT"
          echo "region=${region}"       >> "$GITHUB_OUTPUT"
          echo "app_name=${app_name}"   >> "$GITHUB_OUTPUT"
          echo "registry=${registry}"   >> "$GITHUB_OUTPUT"

      - name: Construct full image reference
        id: image-ref
        run: |
          IMAGE="${{ steps.cfg.outputs.registry }}/${{ steps.cfg.outputs.app_name }}:${{ env.IMAGE_TAG }}"
          echo "value=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Image to build: ${IMAGE}"

      - name: Submit build to Cloud Build
        run: |
          IMAGE="${{ steps.image-ref.outputs.value }}"
          IMAGE_CACHE="${{ steps.cfg.outputs.registry }}/${{ steps.cfg.outputs.app_name }}:buildcache"

          # --no-source: Cloud Build clones the app repo itself via the clone step
          # in cloudbuild.yaml. _APP_REPO and _APP_REF tell it what to clone.
          gcloud builds submit --no-source \
            --project="${{ steps.cfg.outputs.project }}" \
            --region="${{ steps.cfg.outputs.region }}" \
            --config=cloudbuild.yaml \
            --substitutions="_APP_REPO=https://github.com/buxapp/what-time-is-it.git,_APP_REF=${{ env.APP_REF }},_IMAGE=${IMAGE},_IMAGE_CACHE=${IMAGE_CACHE}"

      - name: Build summary
        run: |
          echo "### Image built ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image**: \`${{ steps.image-ref.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**App ref**: \`${{ env.APP_REF }}\`" >> "$GITHUB_STEP_SUMMARY"

  trigger-release:
    name: Trigger blue/green deploy
    runs-on: ubuntu-latest
    needs: build
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.trigger_release == 'true'

    steps:
      - name: Dispatch release.yml
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'release.yml',
              ref: 'main',
              inputs: { image_ref: '${{ needs.build.outputs.image_ref }}' }
            });
            console.log('Triggered release.yml with image: ${{ needs.build.outputs.image_ref }}');
