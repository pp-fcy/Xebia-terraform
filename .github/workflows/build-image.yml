##############################################################################
# build-image.yml – Build and deploy the application Docker image
#
# Triggered by three paths:
#   1. push to main touching hello-world/** — fires via workflow_run AFTER
#      Pre-commit passes (same gate pattern as terraform.yml apply job).
#   2. repository_dispatch (type: hello-world-updated) — external app repo
#      pushes to its own main.
#   3. workflow_dispatch — manual trigger.
#
# Jobs:
#   1. check-app-changes – gate: skips the build when a push to main did not
#      touch the hello-world/ directory.
#   2. build – Run Cloud Build (cloudbuild.yaml): builds Dockerfile from the
#      hello-world/ directory, pushes to Artifact Registry.
#   3. deploy – Calls terraform.yml's deploy job (workflow_call) with the new
#      image. Single-region apply + smoke test, no canary or blue/green.
#
# Project, region, and app_name are read from committed terraform/env/prod.tfvars
# so there are no extra GitHub Variables to maintain.
#
# Required secrets:
#   WORKLOAD_IDENTITY_PROVIDER  – from scripts/init-project.sh
#   GCP_SERVICE_ACCOUNT         – github-actions-sa@<project>.iam.gserviceaccount.com
##############################################################################
name: Build Image

concurrency:
  group: terraform-production
  cancel-in-progress: false

on:
  # Fires after Pre-commit completes on a push to main — ensures pre-commit is
  # a hard gate before the image build starts (mirrors terraform.yml apply pattern).
  workflow_run:
    workflows: ["Pre-commit"]
    types: [completed]
  repository_dispatch:
    types: [hello-world-updated]   # external app repo pushes to main
  workflow_dispatch:
    inputs:
      trigger_deploy:
        description: "Deploy the freshly built image after the build succeeds"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

env:
  # For workflow_run use the pushed commit's SHA; for repository_dispatch use
  # the app repo SHA from the payload; fall back to github.sha for everything else.
  IMAGE_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.sha || github.event.workflow_run.head_sha || github.sha }}

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # GATE – Did this push touch hello-world/?
  # Skips the build when the push only changed unrelated files.
  # Dispatch events (repository_dispatch, workflow_dispatch) always pass through.
  # ────────────────────────────────────────────────────────────────────────────
  check-app-changes:
    name: Detect app changes
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'repository_dispatch' ||
      github.event_name == 'workflow_dispatch'   ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    outputs:
      has_changes: ${{ steps.diff.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2   # need HEAD~1 for the diff
      - name: Check for hello-world/ changes
        id: diff
        run: |
          if [[ "${{ github.event_name }}" != "workflow_run" ]]; then
            echo "Dispatch event — treating as has_changes=true."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^hello-world/' || true)
          if [[ -n "$CHANGED" ]]; then
            echo "Changed files in hello-world/:"
            echo "$CHANGED"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No files changed under hello-world/ — build will be skipped."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # BUILD
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build image via Cloud Build
    runs-on: ubuntu-latest
    needs: check-app-changes
    if: needs.check-app-changes.outputs.has_changes == 'true'
    permissions:
      contents: read
      id-token: write

    env:
      WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT:        ${{ secrets.GCP_SERVICE_ACCOUNT }}

    outputs:
      image_ref: ${{ steps.image-ref.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Read project/region/app_name from committed prod.tfvars so no GitHub Variables needed.
      - name: Read config from prod.tfvars
        id: cfg
        run: |
          tfvars=terraform/env/prod.tfvars
          project=$(  grep 'project_id'      "$tfvars" | sed 's/.*= *"\(.*\)"/\1/')
          region=$(   grep 'primary_region'  "$tfvars" | sed 's/.*= *"\(.*\)"/\1/')
          app_name=$( grep 'app_name'        "$tfvars" | sed 's/.*= *"\(.*\)"/\1/')
          registry="${region}-docker.pkg.dev/${project}/${app_name}"
          echo "project=${project}"     >> "$GITHUB_OUTPUT"
          echo "region=${region}"       >> "$GITHUB_OUTPUT"
          echo "app_name=${app_name}"   >> "$GITHUB_OUTPUT"
          echo "registry=${registry}"   >> "$GITHUB_OUTPUT"

      - name: Construct full image reference
        id: image-ref
        run: |
          IMAGE="${{ steps.cfg.outputs.registry }}/${{ steps.cfg.outputs.app_name }}:${{ env.IMAGE_TAG }}"
          echo "value=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Image to build: ${IMAGE}"

      - name: Submit build to Cloud Build
        run: |
          IMAGE="${{ steps.image-ref.outputs.value }}"
          IMAGE_CACHE="${{ steps.cfg.outputs.registry }}/${{ steps.cfg.outputs.app_name }}:buildcache"

          # Submit the hello-world/ directory — it becomes /workspace in Cloud Build.
          # The Dockerfile lives next to server.py so the build context is self-contained.
          gcloud builds submit hello-world \
            --project="${{ steps.cfg.outputs.project }}" \
            --region="${{ steps.cfg.outputs.region }}" \
            --config=cloudbuild.yaml \
            --substitutions="_IMAGE=${IMAGE},_IMAGE_CACHE=${IMAGE_CACHE}"

      - name: Build summary
        run: |
          echo "### Image built ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image**: \`${{ steps.image-ref.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"

  # Single-region deploy via terraform.yml's reusable `deploy` job.
  # No canary, no blue/green, no auto-rollback — this is the simple POC path.
  deploy:
    name: Deploy new image
    needs: build
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.trigger_deploy == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/terraform.yml
    with:
      image_ref: ${{ needs.build.outputs.image_ref }}
    secrets: inherit
