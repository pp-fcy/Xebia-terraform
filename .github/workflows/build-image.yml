##############################################################################
# build-image.yml – Build and deploy the application Docker image
#
# Triggered by two paths:
#   1. push to main touching hello-world/** — fires via workflow_run AFTER
#      Pre-commit passes (same gate pattern as terraform.yml apply job).
#   2. repository_dispatch (type: hello-world-updated) — external app repo
#      pushes to its own main.
#
# No manual workflow_dispatch — every deploy goes through Pre-commit first.
# To redeploy a previous image, push a revert commit (or roll back the Cloud
# Run revision in the GCP console as an emergency lever).
#
# Jobs:
#   1. check-app-changes – gate: skips the build when a push to main did not
#      touch the hello-world/ directory.
#   2. build  – Cloud Build builds the Dockerfile from hello-world/, pushes
#      the image to Artifact Registry.
#   3. deploy – terraform apply with the new image, then smoke-test `/` and
#      `/healthz`. Inline (not a reusable workflow_call) — keeping it inline
#      avoids the dual-trigger inputs-context pitfall in GitHub Actions.
#
# Project, region, and app_name are read from committed terraform/env/prod.tfvars
# so there are no extra GitHub Variables to maintain.
#
# Required secrets:
#   WORKLOAD_IDENTITY_PROVIDER  – from scripts/init-project.sh
#   GCP_SERVICE_ACCOUNT         – github-actions-sa@<project>.iam.gserviceaccount.com
##############################################################################
name: Build Image

# Default to read-only; individual jobs grant write only where needed. (CKV2_GHA_1)
permissions: read-all

# Shares the terraform-production group with terraform.yml so build-image's
# inline `terraform apply` never races plan/apply runs.
concurrency:
  group: terraform-production
  cancel-in-progress: false

on:
  workflow_run:
    workflows: ["Pre-commit"]
    types: [completed]
  repository_dispatch:
    types: [hello-world-updated]

env:
  # For workflow_run use the pushed commit SHA; for repository_dispatch use
  # the SHA from the dispatch payload.
  IMAGE_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.sha || github.event.workflow_run.head_sha }}
  TF_VERSION:          "~1.5"
  TF_WORKING_DIR:      terraform
  TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform-plugin-cache

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # GATE – Did this push touch hello-world/?
  # repository_dispatch always passes through (the external app repo signalled
  # an actual change). workflow_run runs only if Pre-commit succeeded on a push.
  # ────────────────────────────────────────────────────────────────────────────
  check-app-changes:
    name: Detect app changes
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    outputs:
      has_changes: ${{ steps.diff.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.event.client_payload.sha }}
          fetch-depth: 2
      - name: Check for hello-world/ changes
        id: diff
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "Cross-repo dispatch — treating as has_changes=true."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^hello-world/' || true)
          if [[ -n "$CHANGED" ]]; then
            echo "Changed files in hello-world/:"
            echo "$CHANGED"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No files changed under hello-world/ — build will be skipped."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # BUILD – submit Dockerfile build to Cloud Build, push to Artifact Registry
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build image via Cloud Build
    runs-on: ubuntu-latest
    needs: check-app-changes
    if: needs.check-app-changes.outputs.has_changes == 'true'
    permissions:
      contents: read
      id-token: write

    env:
      WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT:        ${{ secrets.GCP_SERVICE_ACCOUNT }}

    outputs:
      image_ref: ${{ steps.image-ref.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Read project/region/app_name from committed prod.tfvars so no GitHub Variables needed.
      - name: Read config from prod.tfvars
        id: cfg
        run: |
          tfvars=terraform/env/prod.tfvars
          project=$(  grep 'project_id'      "$tfvars" | sed 's/.*= *"\(.*\)"/\1/')
          region=$(   grep 'primary_region'  "$tfvars" | sed 's/.*= *"\(.*\)"/\1/')
          app_name=$( grep 'app_name'        "$tfvars" | sed 's/.*= *"\(.*\)"/\1/')
          registry="${region}-docker.pkg.dev/${project}/${app_name}"
          echo "project=${project}"     >> "$GITHUB_OUTPUT"
          echo "region=${region}"       >> "$GITHUB_OUTPUT"
          echo "app_name=${app_name}"   >> "$GITHUB_OUTPUT"
          echo "registry=${registry}"   >> "$GITHUB_OUTPUT"

      - name: Construct full image reference
        id: image-ref
        run: |
          IMAGE="${{ steps.cfg.outputs.registry }}/${{ steps.cfg.outputs.app_name }}:${{ env.IMAGE_TAG }}"
          echo "value=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Image to build: ${IMAGE}"

      - name: Submit build to Cloud Build
        run: |
          IMAGE="${{ steps.image-ref.outputs.value }}"
          IMAGE_CACHE="${{ steps.cfg.outputs.registry }}/${{ steps.cfg.outputs.app_name }}:buildcache"

          # Submit the hello-world/ directory — it becomes /workspace in Cloud Build.
          # The Dockerfile lives next to server.py so the build context is self-contained.
          gcloud builds submit hello-world \
            --project="${{ steps.cfg.outputs.project }}" \
            --region="${{ steps.cfg.outputs.region }}" \
            --config=cloudbuild.yaml \
            --substitutions="_IMAGE=${IMAGE},_IMAGE_CACHE=${IMAGE_CACHE}"

      - name: Build summary
        run: |
          echo "### Image built ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image**: \`${{ steps.image-ref.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────────────────────────────
  # DEPLOY – terraform apply with the new image, then smoke-test
  # No canary, no blue/green, no auto-rollback — this is the simple POC path.
  # Rollback = push a revert commit (re-runs the same pipeline) or roll back
  # the Cloud Run revision in the GCP console as an emergency lever.
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy new image
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      contents: read
      id-token: write

    env:
      WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT:        ${{ secrets.GCP_SERVICE_ACCOUNT }}
      IMAGE_REF:                  ${{ needs.build.outputs.image_ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: tf-providers-${{ runner.os }}-${{ hashFiles('terraform/providers.tf') }}
          restore-keys: tf-providers-${{ runner.os }}-

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend-config=env/prod.backend.hcl -input=false

      - name: Terraform Apply (deploy new image)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply \
            -var-file="env/prod.tfvars" \
            -var="container_image=${IMAGE_REF}" \
            -auto-approve -input=false

      - name: Read LB IP from Terraform output
        id: tf-out
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          LB_IP=$(terraform output -raw load_balancer_ip)
          echo "lb_ip=${LB_IP}" >> "$GITHUB_OUTPUT"
          echo "LB IP: ${LB_IP}"

      - name: Smoke test via Load Balancer
        run: |
          # Cloud Run ingress is INTERNAL_LOAD_BALANCER — direct Cloud Run URL is blocked.
          # Smoke test via the Global Load Balancer IP instead.
          LB_URL="http://${{ steps.tf-out.outputs.lb_ip }}"

          check_endpoint() {
            local path="$1"
            local expected="$2"
            echo "Smoke testing ${LB_URL}${path} (5 attempts, 10s apart)..."
            for i in $(seq 1 5); do
              BODY=$(curl -s -o - -w "\n%{http_code}" --max-time 15 "${LB_URL}${path}")
              HTTP_CODE=$(echo "$BODY" | tail -1)
              CONTENT=$(echo "$BODY" | head -n -1)
              if [[ "$HTTP_CODE" != "200" ]]; then
                echo "⏳ Attempt ${i}: HTTP ${HTTP_CODE} — LB may still be propagating, retrying..."
                sleep 10
                continue
              fi
              if ! echo "$CONTENT" | grep -q "${expected}"; then
                echo "❌ Attempt ${i}: body missing '${expected}'"
                echo "Body: ${CONTENT}"
                exit 1
              fi
              echo "✅ Attempt ${i}: HTTP 200 with '${expected}'"
              return 0
            done
            echo "❌ All attempts failed for ${path}"
            exit 1
          }

          check_endpoint "/" "Hello World"
          check_endpoint "/healthz" "ok"

      - name: Deploy summary
        if: always()
        run: |
          echo "### Deploy ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image**: \`${IMAGE_REF}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**LB URL**: http://${{ steps.tf-out.outputs.lb_ip }}" >> "$GITHUB_STEP_SUMMARY"
