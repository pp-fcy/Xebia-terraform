##############################################################################
# terraform.yml – Infrastructure plan / apply
#
# Jobs:
#
#   plan   – After Pre-commit passes on a PR: run terraform plan, post the diff
#            as a PR comment.
#   apply  – After Pre-commit passes on a push to main that touched terraform/:
#            run terraform apply (infra only — preserves the currently running
#            container image, which is updated separately by build-image.yml).
#
# Image deploys are handled by build-image.yml, which builds a new image and
# then runs its own terraform apply with the new image_ref. Keeping that path
# inline (no workflow_call indirection) avoids the dual-trigger inputs-context
# pitfall that produces "Startup failure" in GitHub Actions.
#
# Trigger: workflow_run only — there is no manual workflow_dispatch. Every
# Terraform action goes through Pre-commit first, no exceptions.
#
# Concurrency: shares "terraform-production" with build-image.yml so plan,
# apply, and the build-image deploy never run in parallel against the same
# Terraform state.
#
# Config files (committed, no secrets):
#   terraform/env/prod.tfvars       – region, scaling, app_name
#   terraform/env/prod.backend.hcl  – GCS state bucket / prefix
#
# Required secrets:
#   WORKLOAD_IDENTITY_PROVIDER  – from scripts/init-project.sh
#   GCP_SERVICE_ACCOUNT         – github-actions-sa@<project>.iam.gserviceaccount.com
##############################################################################
name: Terraform

concurrency:
  group: terraform-production
  cancel-in-progress: false

on:
  # Plan on PR + apply on push to main, both gated on Pre-commit success.
  workflow_run:
    workflows: ["Pre-commit"]
    types: [completed]

env:
  TF_VERSION:          "~1.5"
  TF_WORKING_DIR:      terraform
  TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform-plugin-cache

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # PLAN – PR review: show what Terraform would change
  # ────────────────────────────────────────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    env:
      WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT:        ${{ secrets.GCP_SERVICE_ACCOUNT }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Effective GCP identity
        run: gcloud auth list --filter=status:ACTIVE --format='table(account,status)'

      - uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: tf-providers-${{ runner.os }}-${{ hashFiles('terraform/providers.tf') }}
          restore-keys: tf-providers-${{ runner.os }}-

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend-config=env/prod.backend.hcl -input=false

      - name: Resolve current image (avoid spurious diff)
        id: current-image
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          IMG=$(terraform state show \
            'module.what_time_is_it.google_cloud_run_v2_service.primary' 2>/dev/null \
            | grep '^\s*image\s*=' | head -1 \
            | sed 's/.*= *"\(.*\)"/\1/' || echo "")
          echo "value=${IMG:-us-docker.pkg.dev/cloudrun/container/hello:latest}" >> "$GITHUB_OUTPUT"

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var-file="env/prod.tfvars" \
            -var="container_image=${{ steps.current-image.outputs.value }}" \
            -out=tfplan -input=false -no-color \
            2>&1 | tee plan_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post plan comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs     = require('fs');
            const raw    = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const out    = raw.length > 60000 ? raw.slice(0, 60000) + '\n...[truncated]' : raw;
            const sha    = '${{ github.event.workflow_run.head_sha }}';
            const branch = '${{ github.event.workflow_run.head_branch }}';
            const body   = `## Terraform Plan\n<details><summary>Show plan</summary>\n\n\`\`\`terraform\n${out}\n\`\`\`\n</details>\n\n> commit \`${sha}\` · branch \`${branch}\``;
            const pr_number = context.payload.workflow_run.pull_requests?.[0]?.number;
            if (!pr_number) { console.log('No associated PR found — skipping comment.'); return; }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr_number
            });
            for (const c of comments) {
              if (c.user.login === 'github-actions[bot]' && c.body.startsWith('## Terraform Plan'))
                await github.rest.issues.deleteComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: c.id });
            }
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr_number, body });

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code != '0'
        run: exit 1

  # ────────────────────────────────────────────────────────────────────────────
  # CHECK-TF-CHANGES – Gate: did this push touch terraform/?
  # ────────────────────────────────────────────────────────────────────────────
  check-tf-changes:
    name: Detect Terraform changes
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    outputs:
      has_changes: ${{ steps.diff.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
      - name: Check for terraform/ changes
        id: diff
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^terraform/' || true)
          if [[ -n "$CHANGED" ]]; then
            echo "Changed files in terraform/:"
            echo "$CHANGED"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No files changed under terraform/ — apply will be skipped."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # APPLY – Infra-only apply on merge to main (image preserved from state).
  # New image deploys are handled inline by build-image.yml.
  # ────────────────────────────────────────────────────────────────────────────
  apply:
    name: Terraform Apply (infra)
    runs-on: ubuntu-latest
    needs: check-tf-changes
    if: needs.check-tf-changes.outputs.has_changes == 'true'
    environment: production
    permissions:
      contents: read
      id-token: write

    env:
      WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT:        ${{ secrets.GCP_SERVICE_ACCOUNT }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: tf-providers-${{ runner.os }}-${{ hashFiles('terraform/providers.tf') }}
          restore-keys: tf-providers-${{ runner.os }}-

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend-config=env/prod.backend.hcl -input=false

      - name: Resolve current image (preserve running image)
        id: current-image
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          IMG=$(terraform state show \
            'module.what_time_is_it.google_cloud_run_v2_service.primary' 2>/dev/null \
            | grep '^\s*image\s*=' | head -1 \
            | sed 's/.*= *"\(.*\)"/\1/' || echo "")
          echo "value=${IMG:-us-docker.pkg.dev/cloudrun/container/hello:latest}" >> "$GITHUB_OUTPUT"

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply \
            -var-file="env/prod.tfvars" \
            -var="container_image=${{ steps.current-image.outputs.value }}" \
            -auto-approve -input=false
