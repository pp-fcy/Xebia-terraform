# Cloud Build config — builds the hello-world sample-service image.
#
# Source: the hello-world/ directory submitted directly as the build source.
# Called via:
#   gcloud builds submit hello-world --config=cloudbuild.yaml \
#     --substitutions=_IMAGE=...,_IMAGE_CACHE=...
#
# Submitting hello-world/ (not the repo root) means Cloud Build's /workspace
# is the app directory itself, so the Dockerfile is at /workspace/Dockerfile.
#
# build-image.yml passes _IMAGE and _IMAGE_CACHE every time, so the defaults
# below are only used for ad-hoc local `gcloud builds submit` runs.

substitutions:
  _IMAGE:       "europe-west1-docker.pkg.dev/bux-project-490819/hello-world/hello-world:latest"
  _IMAGE_CACHE: "europe-west1-docker.pkg.dev/bux-project-490819/hello-world/hello-world:buildcache"

steps:
  - name: "gcr.io/cloud-builders/docker"
    id: pull-cache
    entrypoint: "bash"
    args:
      - "-c"
      - "docker pull ${_IMAGE_CACHE} || true"

  - name: "gcr.io/cloud-builders/docker"
    id: build
    args:
      - build
      - "--cache-from=${_IMAGE_CACHE}"
      - "--tag=${_IMAGE}"
      - "--tag=${_IMAGE_CACHE}"
      - "."
    waitFor: [pull-cache]

  - name: "gcr.io/cloud-builders/docker"
    id: push-image
    args: [push, "${_IMAGE}"]
    waitFor: [build]

  - name: "gcr.io/cloud-builders/docker"
    id: push-cache
    args: [push, "${_IMAGE_CACHE}"]
    waitFor: [build]

images:
  - "${_IMAGE}"

options:
  logging: CLOUD_LOGGING_ONLY
