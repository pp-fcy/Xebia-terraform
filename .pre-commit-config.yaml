# Install: pip install -r requirements-dev.txt && pre-commit install
# Run all hooks: pre-commit run --all-files
# Update hook versions: pre-commit autoupdate
#
# TFLint (first time in terraform/): cd terraform && tflint --init

default_language_version:
  python: python3

repos:
  # ── General hygiene ────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: detect-private-key           # SOC2 CC6.7: no secrets in source
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files      # SOC2 CC6.1: prevent accidental data dumps
        args: [--maxkb=1000]
      - id: check-executables-have-shebangs

  # ── Secret scanning ────────────────────────────────────────────────────────
  # SOC2 CC6.7: deep credential / token detection before push
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # ── Terraform ─────────────────────────────────────────────────────────────
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.3
    hooks:
      - id: terraform_fmt
        args:
          - --args=-recursive
        files: ^terraform/.*\.tf$

      - id: terraform_validate
        files: ^terraform/.*\.tf$

      - id: terraform_tflint
        args:
          - --args=--call-module-type=all
        files: ^terraform/.*\.tf$

  - repo: https://github.com/bridgecrewio/checkov
    rev: 3.2.443
    hooks:
      - id: checkov
        name: Checkov (Terraform)
        args:
          - --directory=terraform
          - --framework=terraform
          - --skip-check=CKV_TF_1  # false positive: registry modules use version= not git hash
          - --compact
          - --quiet
        files: ^terraform/.*\.tf$

      - id: checkov
        name: Checkov (Dockerfile)
        args:
          - --framework=dockerfile
          - --compact
          - --quiet
        files: ^.*/Dockerfile$

      - id: checkov
        name: Checkov (GitHub Actions)
        args:
          - --framework=github_actions
          - --skip-check=CKV2_GHA_1  # false positive: workflow-level permissions: read-all is set; Checkov incorrectly re-flags job blocks
          - --compact
          - --quiet
        files: ^\.github/workflows/.*\.yml$
